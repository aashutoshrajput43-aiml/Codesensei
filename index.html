<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSensei | Enterprise AI Code Analysis</title>

    <link rel="stylesheet" href="Code.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>

    <style>
        /* RESET */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter', sans-serif;
            color:white;
            overflow-x:hidden;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://i.pinimg.com/1200x/80/3c/c2/803cc24726e912cfdcf79e9b80a60ff0.jpg');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            background-attachment:fixed;
        }

        /* NAVBAR */
        .navbar{
            width:100%;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            backdrop-filter:blur(10px);
            background:rgba(255,255,255,0.05);
            border-bottom:1px solid rgba(255,255,255,0.1);
            animation: navSlideDown 0.6s ease-out;
        }

        .logo{
            display:flex;
            align-items:center;
            font-size:28px;
            font-weight:600;
            animation: logoScaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo img{
            width:40px; 
            margin-right:10px;
            border-radius:50%;
            animation: logoImageRotate 1s ease-out;
        }

        @keyframes navSlideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoScaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes logoImageRotate {
            from { opacity: 0; transform: rotate(-180deg) scale(0.5); }
            to { opacity: 1; transform: rotate(0deg) scale(1); }
        }

        /* MAIN CONTAINER */
        .container{
            padding:40px;
            animation: containerFadeIn 0.8s ease-out 0.3s both;
        }

        @keyframes containerFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SPLIT VIEW */
        .split-view{
            display:flex;
            gap:25px;
            flex-wrap:wrap;
        }

        /* PANELS */
        .panel{
            flex:1;
            min-width:320px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            backdrop-filter:blur(15px);
            padding:20px;
            animation: panelSlideUp 0.7s ease-out backwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .left-panel {
            animation-delay: 0.4s;
        }

        .right-panel {
            animation-delay: 0.5s;
        }

        .panel:hover {
            transform: translateY(-5px);
            border-color: #00bfff;
            box-shadow: 0 8px 32px rgba(0, 191, 255, 0.2);
        }

        @keyframes panelSlideUp {
            from { 
                opacity: 0; 
                transform: translateY(40px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .panel-header{
            font-size:20px;
            margin-bottom:15px;
            font-weight:600;
            animation: headerFadeIn 0.6s ease-out 0.6s both;
        }

        @keyframes headerFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Original Textarea (Hidden by CodeMirror) */
        textarea{
            width:100%;
            height:400px;
            background:rgba(0,0,0,0.4);
            color:#fff;
            border:none;
            outline:none;
            border-radius:12px;
            padding:15px;
            font-size:15px;
            resize:none;
            font-family:'Fira Code', monospace;
            transition: all 0.3s ease;
        }

        textarea:focus {
            box-shadow: 0 0 0 2px rgba(0, 191, 255, 0.3), 0 0 20px rgba(0, 191, 255, 0.2);
            transform: scale(1.01);
        }

        /* BUTTON */
        .action-bar{
            margin-top:20px;
            animation: actionBarFadeIn 0.6s ease-out 0.7s both;
        }

        @keyframes actionBarFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .primary-btn{
            padding:12px 24px;
            border:none;
            border-radius:10px;
            background:#00bfff;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .primary-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .primary-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .primary-btn:hover{
            background:#0099cc;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 191, 255, 0.4);
        }

        .primary-btn:active {
            transform: scale(0.98);
        }

        .loading-text {
            margin-left: 15px;
            font-size: 14px;
            color: #00bfff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* OUTPUT */
        .analysis-content{
            min-height:400px;
            background:rgba(0,0,0,0.4);
            border-radius:12px;
            padding:20px;
            animation: contentFadeIn 0.6s ease-out 0.6s both;
        }

        @keyframes contentFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .empty-state{
            opacity:0.7;
        }

        .code-line {
            display: block;
            transition: all 0.3s ease;
            animation: lineEnter 0.4s ease-out backwards;
        }

        @keyframes lineEnter {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .error-line {
            text-decoration: underline wavy #fb7185;
            text-underline-offset: 4px;
            background-color: rgba(251, 113, 133, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid #fb7185;
            padding-left: 8px;
            animation: errorLineHighlight 0.5s ease-out;
        }

        @keyframes errorLineHighlight {
            from {
                opacity: 0;
                background-color: rgba(251, 113, 133, 0);
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                background-color: rgba(251, 113, 133, 0.1);
                transform: translateX(0);
            }
        }

        .error-line:hover {
            background-color: rgba(251, 113, 133, 0.2);
            box-shadow: 0 0 10px rgba(251, 113, 133, 0.4);
            padding-left: 12px;
            animation: errorLineShake 0.3s ease-out;
        }

        @keyframes errorLineShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        /* CHAT WIDGET */
        .chat-widget{
            position:fixed;
            bottom:20px;
            right:20px;
            width:320px;
            background:rgba(20,20,20,0.9);
            border:2px solid #00bfff;
            border-radius:15px;
            overflow:hidden;
            backdrop-filter:blur(10px);
            animation: chatSlideUp 0.5s ease-out;
            box-shadow: 0 8px 32px rgba(0, 191, 255, 0.2);
        }

        @keyframes chatSlideUp {
            from { 
                opacity: 0; 
                transform: translateY(50px) scale(0.9);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }

        .chat-header{
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(0, 191, 255, 0.3);
        }

        .chat-body{
            padding:15px;
            height:220px;
            overflow-y:auto;
        }

        .msg {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            animation: messageBubble 0.4s ease-out;
        }

        @keyframes messageBubble {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .sensei-msg{
            background:rgba(255,255,255,0.08);
            color: #e0e0e0;
            border-left: 3px solid #00bfff;
        }

        .user-msg {
            background: #00bfff;
            color: #000;
            align-self: flex-end;
            margin-left: auto;
            max-width: 85%;
            border-radius: 8px 8px 0 8px;
        }

        #closeChatBtn{
            background:none;
            border:none;
            color:white;
            cursor:pointer;
            font-size:16px;
            transition: all 0.3s ease;
        }

        #closeChatBtn:hover {
            color: #fb7185;
            transform: rotate(90deg) scale(1.2);
        }

        .solution-panel {
            animation: panelSlideIn 0.6s ease-out;
        }

        @keyframes panelSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            background-color: rgba(0, 191, 255, 0.2);
            color: #00bfff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(0, 191, 255, 0.5);
            animation: badgePopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
            margin-left: 10px;
        }

        @keyframes badgePopIn {
            from {
                opacity: 0;
                transform: scale(0) rotate(-180deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* HIDDEN CLASS */
        .hidden{
            display:none !important;
        }

        /* MOBILE */
        @media(max-width:768px){
            .split-view{
                flex-direction:column;
            }
            textarea{
                height:300px;
            }
            .chat-widget{
                width:90%;
                right:5%;
                left:5%;
            }
            .navbar {
                padding: 15px 20px;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="https://i.pinimg.com/1200x/75/54/03/755403981c702a57e5803a014e601380.jpg" alt="CodeSensei Logo">
            CodeSensei
        </div>
    </header>

    <main class="container">
        <section class="split-view">
            <div class="panel left-panel">
                <div class="panel-header">
                    Source Code
                </div>
                <textarea id="codeInput"></textarea>
                <div class="action-bar">
                    <button id="analyzeBtn" class="primary-btn">
                        Run Analysis
                    </button>
                    <span id="loadingMsg" class="loading-text hidden">
                        🔄 Processing logic...
                    </span>
                </div>
            </div>

            <div class="panel right-panel">
                <div class="panel-header">
                    Errors
                    <span id="detectedLangBadge" class="badge hidden">
                        Language: ?
                    </span>
                </div>
                <div id="analysisOutput" class="analysis-content">
                    <div class="empty-state">
                        Awaiting code input to generate diagnostics.
                    </div>
                </div>
            </div>
        </section>

        <section id="resultsSection" class="solution-panel hidden"></section>
    </main>

    <div id="senseiChatWidget" class="chat-widget hidden">
        <div class="chat-header">
            <span>🥷 Sensei AI</span>
            <button id="closeChatBtn">✖</button>
        </div>
        <div id="chatBody" class="chat-body">
            <div class="msg sensei-msg">
                Hello! Double-click on any red error line to ask me for a detailed explanation.
            </div>
        </div>
    </div>

    <script src="Code.js"></script>

</body>
</html>
